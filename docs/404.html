<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Fieldnote</title>
    <script>
      // Handle 404 by redirecting to index.html for client-side routing
      var pathSegmentsToKeep = 2;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
      );
    </script>
  </head>
  <body>
  </body>
</html>
